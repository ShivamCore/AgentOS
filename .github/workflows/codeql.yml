name: CodeQL Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 3"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:

  analyze-python:
    name: CodeQL — Python
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: |
            security-extended
            security-and-quality
          config: |
            paths-ignore:
              - venv
              - .venv
              - tests
              - migrations
              - "**/__pycache__"
            query-filters:
              - exclude:
                  tags contain: experimental

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt --no-cache-dir

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-python
          output: codeql-results/python
          upload: always

      - name: Post CodeQL summary to PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔬 CodeQL Analysis Complete — Python

            Results uploaded to the [Security tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning).

            - Query suite: `security-extended` + `security-and-quality`
            - Commit: `${{ github.sha }}`

            > Any findings will appear as inline PR annotations.

  analyze-javascript:
    name: CodeQL — JavaScript/TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: |
            security-extended
            security-and-quality
          config: |
            paths:
              - frontend/src
            paths-ignore:
              - frontend/node_modules
              - frontend/dist
              - frontend/build
              - "**/*.min.js"
              - "**/*.test.ts"
              - "**/*.spec.ts"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-javascript
          upload: always

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:1.82.0
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config=auto \
            --config=p/python \
            --config=p/fastapi \
            --config=p/celery \
            --config=p/secrets \
            --config=p/jwt \
            --config=p/owasp-top-ten \
            --sarif \
            --output=semgrep.sarif \
            --error \
            --exclude=venv \
            --exclude=tests \
            --exclude="*.min.js" \
            .
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  secret-scanning:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: gitleaks

  osv-scanner:
    name: OSV vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.8.4
        with:
          scan-args: |-
            --lockfile=requirements.txt
            --lockfile=frontend/package-lock.json
            --format=sarif
            --output=osv-results.sarif
            .
        continue-on-error: true

      - name: Upload OSV results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  security-gate:
    name: Security gate
    runs-on: ubuntu-24.04
    needs: [analyze-python, analyze-javascript, semgrep, secret-scanning, osv-scanner]
    if: always()
    steps:
      - name: Check all security jobs passed
        run: |
          results=(
            "${{ needs.analyze-python.result }}"
            "${{ needs.analyze-javascript.result }}"
            "${{ needs.secret-scanning.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo "::error::One or more security checks failed. Merge is blocked."
            exit 1
          fi
          echo "✅ All security checks passed."