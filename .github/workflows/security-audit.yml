name: Dependency Updates

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_audit:
        description: "Force full audit even if no deps changed"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:

  detect-changes:
    name: Detect dependency changes
    runs-on: ubuntu-24.04
    outputs:
      python_changed: ${{ steps.changes.outputs.python }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      docker_changed: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python:
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'setup.cfg'
            frontend:
              - 'frontend/package*.json'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'

  audit-python:
    name: Audit Python dependencies
    runs-on: ubuntu-24.04
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.python_changed == 'true' ||
      github.event.inputs.force_audit == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3 --no-cache-dir

      - name: Run pip-audit (requirements.txt)
        id: audit_main
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output audit-main.json \
            --progress-spinner off \
            --no-deps || true

      - name: Run pip-audit (dev dependencies)
        id: audit_dev
        run: |
          pip-audit \
            --requirement requirements-dev.txt \
            --format json \
            --output audit-dev.json \
            --progress-spinner off \
            --no-deps || true
        continue-on-error: true

      - name: Parse audit results and set outputs
        id: parse
        run: |
          python3 << 'EOF'
          import json, sys, os

          results = []
          for fname in ["audit-main.json", "audit-dev.json"]:
              try:
                  with open(fname) as f:
                      data = json.load(f)
                  results.extend(data.get("dependencies", []))
              except FileNotFoundError:
                  pass

          vulns = [
              dep for dep in results
              if dep.get("vulns")
          ]

          critical = [
              v for dep in vulns
              for v in dep["vulns"]
              if v.get("fix_versions")
          ]

          summary_lines = []
          if not vulns:
              summary_lines.append("✅ No vulnerabilities found.")
          else:
              summary_lines.append(f"🚨 Found {len(vulns)} vulnerable packages:\n")
              for dep in vulns:
                  for v in dep["vulns"]:
                      fix = ", ".join(v.get("fix_versions", ["no fix available"]))
                      summary_lines.append(
                          f"- **{dep['name']}** {dep['version']} — "
                          f"`{v['id']}` — fix: `{fix}`"
                      )

          summary = "\n".join(summary_lines)
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"AUDIT_SUMMARY<<EOF\n{summary}\nEOF\n")
              f.write(f"VULN_COUNT={len(vulns)}\n")
              f.write(f"CRITICAL_COUNT={len(critical)}\n")
          EOF

      - name: Post audit results as PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔍 Python Dependency Audit

            ${{ env.AUDIT_SUMMARY }}

            <details>
            <summary>Full audit report</summary>

            Run `make security` locally to reproduce.
            Powered by [pip-audit](https://github.com/pypa/pip-audit).
            </details>

            > Scanned on commit ${{ github.sha }}

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results-${{ github.sha }}
          path: |
            audit-main.json
            audit-dev.json
          retention-days: 30

      - name: Fail if critical vulnerabilities found
        if: env.CRITICAL_COUNT != '0'
        run: |
          echo "::error::${{ env.CRITICAL_COUNT }} critical vulnerabilities found."
          echo "::error::Review the PR comment for details."
          exit 1

  audit-frontend:
    name: Audit frontend dependencies
    runs-on: ubuntu-24.04
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --audit=false

      - name: Run npm audit
        working-directory: frontend
        id: npm_audit
        run: |
          npm audit --json > npm-audit.json || true
          HIGH=$(cat npm-audit.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          meta=d.get('metadata',{}).get('vulnerabilities',{})
          print(meta.get('high',0)+meta.get('critical',0))
          ")
          echo "HIGH_CRITICAL=$HIGH" >> $GITHUB_ENV

      - name: Post npm audit as PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🔍 Frontend Dependency Audit (npm)

            ${{ env.HIGH_CRITICAL == '0' && '✅ No high/critical vulnerabilities.' || format('🚨 {0} high/critical vulnerabilities found. Run `npm audit` in `/frontend` for details.', env.HIGH_CRITICAL) }}

      - name: Fail on high/critical
        if: env.HIGH_CRITICAL != '0'
        run: |
          echo "::error::Frontend has ${{ env.HIGH_CRITICAL }} high/critical vulnerabilities."
          exit 1

  audit-docker:
    name: Audit Docker image
    runs-on: ubuntu-24.04
    needs: detect-changes
    if: needs.detect-changes.outputs.docker_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: agentos:scan-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: agentos:scan-${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker

  auto-merge-dependabot:
    name: Auto-merge safe Dependabot PRs
    runs-on: ubuntu-24.04
    needs: [audit-python, audit-frontend, audit-docker]
    if: |
      always() &&
      github.actor == 'dependabot[bot]' &&
      !contains(needs.*.result, 'failure')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "${{ github.event.pull_request.html_url }}"
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}