# ═══════════════════════════════════════════════════════════════════════════════
# AgentOS — Pre-commit Hooks
# ═══════════════════════════════════════════════════════════════════════════════
# Install: pre-commit install --install-hooks
# Run all: pre-commit run --all-files
# Update:  pre-commit autoupdate
# ═══════════════════════════════════════════════════════════════════════════════

fail_fast: false   # Show all errors at once, not just the first

repos:
  # ── Ruff: fast Python linting + formatting ─────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ── Black: opinionated Python formatter ────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: "24.4.2"
    hooks:
      - id: black
        language_version: python3.11

  # ── mypy: type checking on changed files ───────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.2
          - sqlalchemy>=2.0
          - fastapi>=0.111
          - types-requests>=2.31
        args: [--ignore-missing-imports, --no-strict-optional]
        pass_filenames: true

  # ── Bandit: security linting ───────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-ll, -x, tests/]
        types: [python]

  # ── detect-secrets: block accidental secret commits ────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: (package-lock\.json|\.env\.example)

  # ── Standard file hygiene hooks ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=500]

  # ── Block direct commits to main ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ── Commitizen: enforce conventional commit messages ───────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.25.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
